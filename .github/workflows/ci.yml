name: CI Python 3 on Linux

on:
  push:
  pull_request:
  # Run daily at 12:01 UTC
  schedule:
  - cron:  '1 12 * * *'

jobs:
  test:

    strategy:
      max-parallel: 4
      matrix:
        platform: [ubuntu-latest, windows-latest]
        python-version: [3.6, 3.7]
    runs-on: ${{ matrix.platform }}

    steps:
    - uses: actions/checkout@master
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v1
      with:
        version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --ignore-installed -U -q --no-cache-dir -e .[complete]
        pip list
        printenv
    - name: Lint with Pyflakes
      run: |
        pyflakes src
        check-manifest
    - name: Lint with Black
      run: |
        black --check --diff --verbose .
    - name: Check MANIFEST
      run: |
        check-manifest
    - name: Test with pytest
      run: |
        python -m pytest -r sx --ignore tests/benchmarks/
    - name: Run benchmarks
      if: github.event_name == 'scheduled' && matrix.python-version != '3.6'
      run: |
        python -m pytest -r sx tests/benchmarks/test_benchmark.py
